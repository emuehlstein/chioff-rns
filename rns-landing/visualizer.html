<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Network Visualizer — Chicago Offline Reticulum</title>
  <style>
    :root { --cyan:#00E5FF; --amber:#FFB300; --green:#39FF14; --bg:#0a0e14; --surface:#111820; --text:#c8ccd0; --text-bright:#e8ecf0; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; }
    body { font-family:'Courier New',monospace; background:var(--bg); color:var(--text); display:flex; flex-direction:column; overflow:hidden; }
    header { padding:0.75rem 1rem; border-bottom:1px solid #1e2530; display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
    header h1 { color:var(--cyan); font-size:1.05rem; }
    header .sub { color:var(--amber); font-size:0.78rem; }
    header .spacer { flex:1; }
    header a { color:var(--cyan); font-size:0.8rem; text-decoration:none; }
    header a:hover { text-decoration:underline; }
    #wrap { flex:1; position:relative; }
    canvas { display:block; width:100%; height:100%; cursor:grab; }
    canvas.dragging { cursor:grabbing; }
    .panel { position:absolute; background:var(--surface); border:1px solid #1e2530; border-radius:8px; padding:0.75rem 0.9rem; font-size:0.78rem; line-height:1.5; }
    #legend { top:0.75rem; left:0.75rem; }
    #legend .row { display:flex; align-items:center; gap:0.5rem; margin:0.15rem 0; }
    #legend .dot { width:0.7rem; height:0.7rem; border-radius:50%; flex-shrink:0; }
    #stats { top:0.75rem; right:0.75rem; min-width:160px; }
    #stats .val { color:var(--text-bright); }
    #stats h2 { color:var(--green); font-size:0.85rem; margin-bottom:0.4rem; }
    #info { bottom:0.75rem; right:0.75rem; max-width:280px; display:none; }
    #info h2 { color:var(--cyan); font-size:0.85rem; margin-bottom:0.4rem; word-break:break-all; }
    #info .k { color:var(--amber); }
    #note { bottom:0.75rem; left:0.75rem; color:#666; font-size:0.72rem; }
    #status-msg { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:var(--amber); font-size:0.9rem; }
  </style>
</head>
<body>
  <header>
    <h1>📡 Network Visualizer</h1>
    <span class="sub">rns.chicagooffline.com mesh</span>
    <span class="spacer"></span>
    <a href="index.html">&larr; node home</a>
  </header>
  <div id="wrap">
    <canvas id="net"></canvas>
    <div id="legend" class="panel">
      <div class="row"><span class="dot" style="background:var(--cyan)"></span> Transport node (us)</div>
      <div class="row"><span class="dot" style="background:var(--green)"></span> Transport peer (via)</div>
      <div class="row"><span class="dot" style="background:var(--amber)"></span> Destination</div>
      <div class="row"><span class="dot" style="background:#888"></span> Interface</div>
    </div>
    <div id="stats" class="panel">
      <h2>Network</h2>
      <div>nodes: <span class="val" id="s-nodes">–</span></div>
      <div>paths: <span class="val" id="s-paths">–</span></div>
      <div>peers: <span class="val" id="s-peers">–</span></div>
      <div>updated: <span class="val" id="s-updated">–</span></div>
    </div>
    <div id="info" class="panel"></div>
    <div id="note" class="panel" style="padding:0.4rem 0.6rem;">drag · scroll to zoom · click node</div>
    <div id="status-msg">loading network…</div>
  </div>
  <script>
  (function () {
    const canvas = document.getElementById('net');
    const ctx = canvas.getContext('2d');
    const COLORS = { self: '#00E5FF', peer: '#39FF14', dest: '#FFB300', iface: '#888888' };
    const RADIUS = { self: 16, peer: 9, dest: 6, iface: 7 };
    let nodes = [], links = [], view = { x: 0, y: 0, k: 1 };
    let dragNode = null, panning = false, last = { x: 0, y: 0 }, selected = null;

    function resize() {
      const r = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = r.width * dpr; canvas.height = r.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', resize); resize();

    function buildGraph(snap) {
      const N = new Map(), L = [];
      const cx = canvas.clientWidth / 2, cy = canvas.clientHeight / 2;
      const node = (id, type, label) => {
        if (!N.has(id)) N.set(id, { id, type, label, x: cx + (Math.random()-0.5)*200, y: cy + (Math.random()-0.5)*200, vx: 0, vy: 0 });
        return N.get(id);
      };
      const self = node('self', 'self', snap.node && snap.node.public_address || 'this node');
      const ifaces = (snap.interfaces || []).filter(i => i.online);
      ifaces.forEach(i => { node('iface:' + i.name, 'iface', i.name); L.push({ a: 'self', b: 'iface:' + i.name }); });
      const entries = (snap.path_table && snap.path_table.entries) || [];
      entries.forEach(e => {
        const via = node('via:' + e.via, 'peer', e.via_label || e.via); via.named = !!e.via_label;
        L.push({ a: 'self', b: via.id });
        const did = 'dest:' + e.destination;
        const d = node(did, 'dest', e.destination_label || e.destination); d.named = !!e.destination_label;
        L.push({ a: via.id, b: did, hops: e.hops });
      });
      nodes = [...N.values()]; links = L;
      document.getElementById('s-nodes').textContent = nodes.length;
      document.getElementById('s-paths').textContent = (snap.network && snap.network.paths) ?? entries.length;
      document.getElementById('s-peers').textContent = (snap.network && snap.network.transport_peers) ?? '–';
      document.getElementById('s-updated').textContent = snap.generated_at ? new Date(snap.generated_at).toLocaleTimeString() : '–';
    }

    function step() {
      const cx = canvas.clientWidth / 2, cy = canvas.clientHeight / 2;
      for (const n of nodes) for (const m of nodes) {
        if (n === m) continue;
        let dx = n.x - m.x, dy = n.y - m.y, d = Math.hypot(dx, dy) || 0.01;
        const f = 2500 / (d * d); n.vx += dx / d * f; n.vy += dy / d * f;
      }
      for (const l of links) {
        const a = byId(l.a), b = byId(l.b); if (!a || !b) continue;
        let dx = b.x - a.x, dy = b.y - a.y, d = Math.hypot(dx, dy) || 0.01, f = (d - 90) * 0.02;
        a.vx += dx / d * f; a.vy += dy / d * f; b.vx -= dx / d * f; b.vy -= dy / d * f;
      }
      for (const n of nodes) {
        n.vx += (cx - n.x) * 0.001; n.vy += (cy - n.y) * 0.001;
        if (n === dragNode) continue;
        n.vx *= 0.85; n.vy *= 0.85; n.x += n.vx; n.y += n.vy;
      }
    }
    const byId = id => nodes.find(n => n.id === id);

    function draw() {
      ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);
      ctx.save(); ctx.translate(view.x, view.y); ctx.scale(view.k, view.k);
      ctx.lineWidth = 1;
      for (const l of links) {
        const a = byId(l.a), b = byId(l.b); if (!a || !b) continue;
        ctx.strokeStyle = 'rgba(0,229,255,0.18)'; ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      }
      for (const n of nodes) {
        const r = RADIUS[n.type] || 6;
        ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, 6.283); ctx.fillStyle = COLORS[n.type]; ctx.fill();
        if (n === selected) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke(); }
        if (n.type === 'self' || n.named || n === selected) {
          ctx.fillStyle = '#e8ecf0'; ctx.font = '11px Courier New';
          ctx.fillText(n.label || n.id, n.x + r + 3, n.y + 3);
        }
      }
      ctx.restore();
    }
    function loop() { step(); draw(); requestAnimationFrame(loop); }

    function toWorld(e) { const r = canvas.getBoundingClientRect(); return { x: (e.clientX - r.left - view.x) / view.k, y: (e.clientY - r.top - view.y) / view.k }; }
    function hit(p) { return nodes.find(n => Math.hypot(n.x - p.x, n.y - p.y) < (RADIUS[n.type] || 6) + 4); }
    canvas.addEventListener('mousedown', e => { const n = hit(toWorld(e)); if (n) { dragNode = n; selected = n; showInfo(n); } else { panning = true; selected = null; document.getElementById('info').style.display = 'none'; } last = { x: e.clientX, y: e.clientY }; canvas.classList.add('dragging'); });
    canvas.addEventListener('mousemove', e => { if (dragNode) { const p = toWorld(e); dragNode.x = p.x; dragNode.y = p.y; dragNode.vx = dragNode.vy = 0; } else if (panning) { view.x += e.clientX - last.x; view.y += e.clientY - last.y; last = { x: e.clientX, y: e.clientY }; } });
    window.addEventListener('mouseup', () => { dragNode = null; panning = false; canvas.classList.remove('dragging'); });
    canvas.addEventListener('wheel', e => { e.preventDefault(); const f = e.deltaY < 0 ? 1.1 : 0.9; view.k = Math.max(0.2, Math.min(5, view.k * f)); }, { passive: false });

    function showInfo(n) {
      const el = document.getElementById('info');
      const t = { self: 'transport node', peer: 'transport peer', dest: 'destination', iface: 'interface' }[n.type];
      el.innerHTML = '<h2>' + (n.label || n.id) + '</h2><div><span class="k">type:</span> ' + t + '</div>';
      el.style.display = 'block';
    }

    function load() {
      fetch('status.json', { cache: 'no-store' }).then(r => r.json()).then(s => {
        document.getElementById('status-msg').style.display = 'none';
        buildGraph(s);
      }).catch(() => { document.getElementById('status-msg').textContent = 'status.json unavailable'; });
    }
    load(); setInterval(load, 60000); loop();
  })();
  </script>
</body>
</html>
