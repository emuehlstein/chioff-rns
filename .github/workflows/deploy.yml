name: Deploy to chioff-rns

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.RNS_SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.RNS_SSH_KEY }}
          script: |
            cd /opt/chioff-rns
            sudo -u ubuntu bash scripts/deploy.sh
